name: appstone
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  file_picker: ^11.0.2
  speech_to_text: ^7.4.0
  http: ^1.2.0
  shared_preferences: ^2.5.3
  syncfusion_flutter_pdf: ^31.1.19
  archive: ^4.0.9
  xml: ^6.6.1
  intl: ^0.20.2
  csv: ^6.0.0
  cloud_functions: ^6.3.3
  printing: ^5.14.3
  pdf: ^3.11.3
  record: ^6.2.1
  path_provider: ^2.1.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# App launcher icons + web favicon, generated from the Appstone mark.
# Sources are rendered from the same painter as the in-app logo
# (assets/branding/appstone_icon*.png). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/appstone_icon_1024.png"
  # Full-bleed square source; the OS rounds the corners into a tile itself.
  android: true
  adaptive_icon_background: "#8B1A1A"
  adaptive_icon_foreground: "assets/branding/appstone_icon_foreground_1024.png"
  ios: true
  # iOS rejects icons with transparency; the base is opaque, but flatten to be safe.
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/branding/appstone_icon_1024.png"
    background_color: "#8B1A1A"
    theme_color: "#8B1A1A"
