<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Appstone">
  <!-- Single-colour Appstone mark (no tile) for stamps, watermarks, and
       favicons. Uses currentColor so it can be tinted in CSS/Flutter; opened on
       its own it falls back to the brand maroon. -->
