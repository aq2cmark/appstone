<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Appstone">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Appstone</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Floating install button - only shown on Android/iOS via JS below */
    #pwa-install-btn {
      display: none;
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      border: none;
      border-radius: 12px;
      background: #9E1B1F;
      color: #fff;
      font-family: sans-serif;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #pwa-install-btn svg { width: 22px; height: 22px; fill: #fff; }

    #pwa-ios-tip {
      display: none;
      position: fixed;
      right: 16px;
      top: calc(50% + 60px);
      z-index: 9999;
      max-width: 220px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #333;
      color: #fff;
      font-family: sans-serif;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Install button: only appears on Android/iOS when the app isn't installed yet -->
  <button id="pwa-install-btn">
    <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
    Install
  </button>
  <div id="pwa-ios-tip">
    Tap the Share icon <b>⬆️</b> then "Add to Home Screen" to install this app.
  </div>

  <script>
    (function () {
      var installBtn = document.getElementById('pwa-install-btn');
      var iosTip = document.getElementById('pwa-ios-tip');
      var ua = navigator.userAgent;
      var isAndroid = /Android/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;

      // Already installed, or not on a mobile device: nothing to do.
      if (isStandalone || (!isAndroid && !isIOS)) return;

      var deferredPrompt = null;

      if (isAndroid) {
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
          installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', function () {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function () {
            deferredPrompt = null;
            installBtn.style.display = 'none';
          });
        });

        window.addEventListener('appinstalled', function () {
          installBtn.style.display = 'none';
        });
      } else if (isIOS) {
        // iOS has no install prompt API, so the button just reveals instructions.
        installBtn.style.display = 'flex';
        installBtn.addEventListener('click', function () {
          iosTip.style.display = iosTip.style.display === 'block' ? 'none' : 'block';
        });
      }
    })();
  </script>
</body>
</html>
